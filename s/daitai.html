<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代替方程式における簡単について | Misemi-ya University Portal</title>
    <meta name="description" content="学内向け PDF 閲覧ページです。VPN 接続時のみ閲覧できます。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Serif+JP:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --navy: #0a2f57;
            --blue: #1e5b98;
            --line: #d8e2ea;
            --ink: #27384c;
            --muted: #6a7d92;
            --bg: #f3f6fa;
            --card: #ffffff;
            --shadow: 0 18px 42px rgba(9, 40, 77, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans JP", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #f8fbfe, var(--bg));
        }
        a { color: inherit; text-decoration: none; }
        .container { width: min(1240px, calc(100% - 40px)); margin: 0 auto; }
        #vpn-lock-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.98);
            text-align: center;
            padding: 24px;
            transition: opacity .45s ease;
        }
        #vpn-checking { color: #4d6178; }
        #vpn-error { display: none; max-width: 540px; }
        .error-code { margin: 0; font-size: 5rem; color: var(--navy); }
        .error-msg { margin: 0 0 12px; font-size: 1.4rem; color: var(--ink); font-weight: 700; }
        .status-box {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            background: #f5f8fb;
            border: 1px solid var(--line);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            color: #526579;
        }
        #securedDoc { display: none; }
        .page-header {
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid rgba(216, 226, 234, 0.95);
            background: rgba(248, 251, 254, 0.94);
            backdrop-filter: blur(12px);
        }
        .page-header__inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 16px 0;
        }
        .brand { color: var(--navy); font-weight: 800; font-size: 1.2rem; }
        .header-actions { display: flex; flex-wrap: wrap; gap: 12px; }
        .header-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.9);
            color: var(--ink);
            font-weight: 700;
        }
        .header-link--primary { background: linear-gradient(135deg, var(--navy), var(--blue)); color: #fff; border-color: transparent; }
        .hero { padding: 34px 0 20px; }
        .hero-card, .viewer-card {
            background: var(--card);
            border: 1px solid rgba(216, 226, 234, 0.92);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }
        .hero-card { padding: 28px; }
        .hero-card h1 {
            margin: 0 0 12px;
            font-family: "Noto Serif JP", serif;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            color: var(--navy);
        }
        .hero-card p { margin: 0; line-height: 1.9; color: var(--muted); }
        .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
        .viewer-card { margin: 0 0 40px; padding: 18px; }
        .viewer-frame {
            width: 100%;
            min-height: 78vh;
            border: 0;
            border-radius: 18px;
            background: #eef3f8;
        }
        @media (max-width: 720px) {
            .container { width: min(1240px, calc(100% - 28px)); }
            .page-header__inner { flex-direction: column; align-items: stretch; }
            .hero-card, .viewer-card { border-radius: 22px; }
            .viewer-frame { min-height: 68vh; }
        }
    </style>
</head>
<body>
    <div id="vpn-lock-screen">
        <div id="vpn-checking">
            <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color:#0a2f57;"></i>
            <p>VPN 接続を確認しています...</p>
        </div>
        <div id="vpn-error">
            <p class="error-code">403</p>
            <p class="error-msg">Access Denied</p>
            <p>この PDF 閲覧ページは学内ポータルと同じ VPN 接続が必要です。指定された VPN に接続したうえで再読み込みしてください。</p>
            <div class="status-box">Your IP: <span id="user-ip">...</span></div>
        </div>
    </div>

    <div id="securedDoc">
        <header class="page-header">
            <div class="container page-header__inner">
                <div class="brand">店魅偉屋大学 論文掲載</div>
                <div class="header-actions">
                    <a class="header-link" href="r.html">論文掲載へ戻る</a>
                    <a class="header-link header-link--primary" href="daitai.pdf" target="_blank" rel="noopener noreferrer">PDF を別タブで開く</a>
                </div>
            </div>
        </header>

        <main>
            <section class="hero">
                <div class="container hero-card">
                    <h1>代替方程式における簡単について</h1>
                    <p>学内向け配布資料の閲覧ページです。このページ自体は VPN 制限の内側でのみ表示されます。</p>
                    <div class="hero-actions">
                        <a class="header-link header-link--primary" href="daitai.pdf" target="_blank" rel="noopener noreferrer">PDF をダウンロード</a>
                    </div>
                </div>
            </section>
            <div class="container viewer-card">
                <iframe class="viewer-frame" src="daitai.pdf" title="代替方程式における簡単について"></iframe>
            </div>
        </main>
    </div>

    <script>
        const VPN_HOST = "public-vpn-202.opengw.net";
        const getSubnet = (ip) => ip ? ip.split(".").slice(0, 3).join(".") : "";

        async function verifyConnection() {
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const myIp = (await ipRes.json()).ip;
                const dnsRes = await fetch(`https://dns.google/resolve?name=${VPN_HOST}&type=A`);
                const vpnIp = (await dnsRes.json()).Answer?.[0]?.data || "Unresolved";

                if (vpnIp !== "Unresolved" && getSubnet(myIp) === getSubnet(vpnIp)) {
                    const lock = document.getElementById("vpn-lock-screen");
                    lock.style.opacity = "0";
                    setTimeout(() => {
                        lock.style.display = "none";
                        document.getElementById("securedDoc").style.display = "block";
                    }, 450);
                } else {
                    document.getElementById("vpn-checking").style.display = "none";
                    document.getElementById("vpn-error").style.display = "block";
                    document.getElementById("user-ip").textContent = myIp;
                }
            } catch (error) {
                document.getElementById("vpn-checking").style.display = "none";
                document.getElementById("vpn-error").style.display = "block";
                document.getElementById("user-ip").textContent = "Error";
            }
        }

        window.addEventListener("load", verifyConnection);
    </script>
</body>
</html>
