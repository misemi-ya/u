name: Update J-STAGE Papers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update J-STAGE paper data
        run: python scripts/update_jstage_papers.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add s/papers-data.js
          git diff --cached --quiet && exit 0
          git commit -m "chore: update J-STAGE paper data"
          git push
